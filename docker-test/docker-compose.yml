version: "3.8"

# CYBERFRAME Docker Test Stack
# 4 services for testing Docker Container Management feature

services:
  # 1. Nginx — reverse proxy / web server
  nginx:
    image: nginx:alpine
    container_name: cf-nginx
    ports:
      - "8888:80"
    volumes:
      - ./nginx-html:/usr/share/nginx/html:ro
    restart: unless-stopped
    labels:
      cyberframe.test: "true"
      cyberframe.desc: "Web Server"

  # 2. Redis — in-memory cache
  redis:
    image: redis:alpine
    container_name: cf-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel notice
    volumes:
      - redis-data:/data
    restart: unless-stopped
    labels:
      cyberframe.test: "true"
      cyberframe.desc: "Cache Server"

  # 3. PostgreSQL — database
  postgres:
    image: postgres:16-alpine
    container_name: cf-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cyberframe
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: cyberframe_test
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    labels:
      cyberframe.test: "true"
      cyberframe.desc: "Database"

  # 4. Portainer Agent — container monitoring
  whoami:
    image: traefik/whoami
    container_name: cf-whoami
    ports:
      - "8889:80"
    restart: unless-stopped
    labels:
      cyberframe.test: "true"
      cyberframe.desc: "Debug / WhoAmI"

  # 5. Log Generator — mock log stream for testing
  loggen:
    image: alpine
    container_name: cf-loggen
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        i=0
        while true; do
          i=$$((i+1))
          case $$((i % 4)) in
            0) LVL=INFO ;;
            1) LVL=WARN ;;
            2) LVL=ERROR ;;
            3) LVL=DEBUG ;;
          esac
          case $$((i % 10)) in
            0) MSG="Request processed successfully" ;;
            1) MSG="Connection established from 10.0.0.$$i" ;;
            2) MSG="Cache miss for key user:session:$$i" ;;
            3) MSG="Query executed in $${i}ms" ;;
            4) MSG="Health check OK - uptime $${i}s" ;;
            5) MSG="Rate limit exceeded for IP 192.168.1.$$((i%255))" ;;
            6) MSG="Session expired for user_$$i" ;;
            7) MSG="Payment received $$$$$$((i*10)).00 USD" ;;
            8) MSG="Webhook dispatched to endpoint #$$i" ;;
            9) MSG="File uploaded: document_$${i}.pdf ($$((i*100))KB)" ;;
          esac
          echo "$$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ) [$$LVL] #$$(printf '%05d' $$i) $$MSG"
          sleep $$((i % 3 + 1))
        done
    restart: unless-stopped
    labels:
      cyberframe.test: "true"
      cyberframe.desc: "Log Generator"

volumes:
  redis-data:
  pg-data:
